<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title, description, canonical and social tags are owned per-route by
         src/components/Seo.tsx (react-helmet), so each prerendered page emits
         exactly one of each. Intentionally no static title element here. -->
    <meta name="author" content="Foundry Padel" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/rebrand/favicon-green-white.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#313E39" />

    <!-- LocalBusiness / SportsActivityLocation structured data (static, always
         crawlable regardless of JS). Powers "padel Portland / St. Johns" and the
         local pack. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsActivityLocation",
        "@id": "https://www.foundrypadel.com/#club",
        "name": "Foundry Padel",
        "description": "Portland's first indoor padel club — four panoramic glass courts, a bar, and social spaces in St. Johns, next to Cathedral Park. Racket rentals and a pro shop on site, and no partner needed.",
        "url": "https://www.foundrypadel.com",
        "image": "https://www.foundrypadel.com/og-image.png",
        "email": "portland@foundrypadel.com",
        "sport": "Padel",
        "priceRange": "$$",
        "currenciesAccepted": "USD",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "8613 N Crawford St",
          "addressLocality": "Portland",
          "addressRegion": "OR",
          "postalCode": "97203",
          "addressCountry": "US"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 45.5897,
          "longitude": -122.7563
        },
        "areaServed": "Portland, Oregon",
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday",
              "Saturday",
              "Sunday"
            ],
            "opens": "08:00",
            "closes": "22:00"
          }
        ],
        "sameAs": [
          "https://instagram.com/foundrypadelpdx",
          "https://www.facebook.com/share/1Cerw2CTec/?mibextid=wwXIfr",
          "https://tiktok.com/@foundry.padel"
        ],
        "makesOffer": {
          "@type": "Offer",
          "name": "Drop-in padel court booking",
          "price": "60",
          "priceCurrency": "USD",
          "description": "$60 per court for a 90-minute booking ($15 per player). Racket rentals from $5; balls available in the pro shop."
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
